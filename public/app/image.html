<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport"
        content="initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,width=device-width,user-scalable=no" />

    <!-- Open Graph meta tags -->

    <style>
        body, html {
            height: 100%;
            margin: 0px;
        }
        body {
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            background-color: black;
        }
        @media (min-width: 640px), (min-height: 480px) {
            body {
                background-size: contain;
            }
        }
    </style>
    <script src="pp-api.js"></script>
    <script>function handleDeviceMessage(m) { P.handleDeviceMessage(m);} P.imageApp("/praiseprojector/");</script>
</head>
<body>
    <div id="exit-toast">__TOAST_TEXT__</div>
    <style>
        #exit-toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.85);
            color: #222;
            padding: 10px 28px;
            border-radius: 24px;
            font: 500 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            pointer-events: none;
            opacity: 0;
            animation: toast-in 0.3s 0.5s ease forwards, toast-out 0.4s 4s ease forwards;
            z-index: 9999;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        @keyframes toast-in  { to { opacity: 1; } }
        @keyframes toast-out { to { opacity: 0; } }
    </style>
</body>
</html>
