<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport"
       content="initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,width=device-width,user-scalable=yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="HandheldFriendly" content="True" />

    <!-- Open Graph meta tags -->

    <link rel="icon" href="/images/pp.svg" type="image/svg+xml">
    <script src="../assets/js/util.js"></script>
    <style>
        body {
            overflow: hidden;
            height: 100%;
            margin: 0px;
            background-color: #4AA0DD;
        }        
        #tabletFrame {
            position: fixed;
            left: 0px;
            right: 0px;
            transform-origin: center;
            width: 100%;
            height: 100%;
        }
        #tabletContent {
            position: fixed;
            background-color: white;
        }
        img {
            position: fixed;
            background-color: transparent;
            pointer-events: none;  
        }
        #flare {
            left: 0px;
            right: 0px;
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
    //<!--
        var horizontal = 0;
        var right = true;
        var tabletDimensions = { width:706, height: 1000 };
        var contentDimensions = { width:612, height: 816 };
        var contentOffset = { left:47, top:93 };
        var inrotate = false;

        function swapDims(pos, sizeOnly) {
            return { left: sizeOnly ? pos.left : pos.top, top: sizeOnly ? pos.top : pos.left, width: pos.height, height: pos.width };
        }

        function calcPos(dim, parentDim, parentRect) {
            var left, top, width, height;
            height = dim.height / parentDim.height * parentRect.height;
            width = height * dim.width / dim.height;
            if(width > parentRect.width) {
                width = parentRect.width;
                height = dim.height * width / dim.width;
            }
            left = (parentRect.width - width) / 2 + parentRect.left;
            top = (parentRect.height - height) / 2 + parentRect.top;
            return { left, top, width, height };
        }

        function getAvailableRect() {
            var container = document.getElementById("tabletFrame")
            return { left: 8, top: 8, width: container.clientWidth - 16, height: container.clientHeight - 16 };
        }

        function resize() {
            if(inrotate) return;

            var containerRect = getAvailableRect();
            var image = document.getElementById("tabletImage");
            var frame = document.getElementById("tabletContent");
            var setPos = function(elem, pos) {
                elem.style.height = pos.height + "px";            
                elem.style.width = pos.width + "px";
                elem.style.left = pos.left + "px";
                elem.style.top = pos.top + "px";
            }

            var targetDim = horizontal ? swapDims(tabletDimensions, true) : tabletDimensions;
            var imagePos = calcPos(targetDim, targetDim, containerRect);
            var framePos = calcPos(contentDimensions, horizontal ? swapDims(tabletDimensions) : tabletDimensions, imagePos);
            framePos = horizontal ? swapDims(framePos) : framePos;

            if(horizontal) {
                var pos = swapDims(imagePos, true);
                framePos.left = pos.left + pos.height * contentOffset.top / targetDim.width;
                framePos.top = pos.top + pos.width * contentOffset.left / targetDim.height;
                pos.top = (containerRect.height - pos.height) / 2 + containerRect.left;
                pos.left = (containerRect.width - pos.width) / 2 + containerRect.top;
                setPos(image, pos);
                image.style.transform = "rotate(" + (horizontal > 0 ? "" : "-") + "90deg)";
            } else {
                framePos.left = imagePos.left + imagePos.width * contentOffset.left / tabletDimensions.width;
                framePos.top = imagePos.top + imagePos.height * contentOffset.top / tabletDimensions.height;
                setPos(image, imagePos);
                image.style.transform = "none";
            }

            image.width = imagePos.width;
            image.height = imagePos.height;
            
            frame.width = framePos.width;
            frame.height = framePos.height;            

            setPos(frame, framePos);
        }

        function rotate(event) {     
            event.preventDefault();
            if(inrotate) return;
            inrotate = true;

            horizontal = horizontal ? 0 : right ? 1 : -1;

            var tabletFrame = document.getElementById("tabletFrame");
            var containerRect = getAvailableRect();
            var targetDim = horizontal ? swapDims(tabletDimensions, true) : tabletDimensions;
            var imagePos = calcPos(targetDim, targetDim, containerRect);
            var rect = document.getElementById("tabletImage").getBoundingClientRect();
            var scale = imagePos.width / rect.height;
            var rot = [ "rotate(90deg)", "rotate(-90deg)" ];
            var trans = [ horizontal ? rot[right ? 0 : 1] : rot[right ? 1 : 0], " scale(" + scale + ")" ];

            tabletFrame.style.transition = "all 1s 0s";
            tabletFrame.style.transform = trans[scale > 1 ? 0 : 1];

            setTimeout(function() {
                tabletFrame.style.transform += trans[scale > 1 ? 1 : 0];
                setTimeout(function() {
                    tabletFrame.style.transition = "";
                    tabletFrame.style.transform = "none";
                    inrotate = false;
                    try {
                        var tabletContent = document.getElementById("tabletContent");
                        if(tabletContent && tabletContent.contentWindow) tabletContent.contentWindow.forceOrientation(!horizontal ? 0 : right ? 90 : -90);
                    } catch(e) { console.log("Can't simulate left rotate", e); }
                    onresize();
                    if(!horizontal) right = !right;
                }, 1000);
            }, 1000);
        }

        function load() {
            var query_params = {};
            var combiner = "?";
            var url = "/app/main.html";
            for(var key in query_params) {
                url += combiner + key + "=" + query_params[key];
                combiner = "&";
            }
            if (isMobileDevice()) { window.location.href = url; } else {
                var frame = document.getElementById("tabletContent");
                frame.src = url;
                resize();
                if (!localStorage && !window.localStorage) setTimeout(function() {
                    var exitWarn = "\uD83D\uDEAA?";
                    window.onbeforeunload = function() { return exitWarn; };
                    window.addEventListener('beforeunload', function (e) { e.returnValue = exitWarn; });
                }, 30000);
            }
        }
    //-->
    </script>
</head>
<body onload="load()" onresize="resize()">
	<div id="tabletFrame" onclick="rotate(event)">
		<iframe id="tabletContent" src="/app/main.html" title="Publikus dalok" allowfullscreen="true" width="720" height="1280"></iframe>
        <img id="tabletImage" src="/assets/images/tablet.png" />
    </div>
    <img id="flare" src="/assets/images/flare.png" />
</body>
